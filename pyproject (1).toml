[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "dvnc-connectome"
version = "3.0.0"
description = "DVNC.AI — Brain-inspired knowledge graph with Da Vinci Routing and 6-Agent discovery system"
requires-python = ">=3.10"
dependencies = [
    "gradio>=4.0.0",
    "networkx>=3.0",
    "numpy>=1.24",
    "pandas>=2.0",
    "requests>=2.31",
    "anthropic>=0.25.0",
    "pyvis>=0.3.2",
    "matplotlib>=3.7",
    "scipy>=1.11",
    "tqdm>=4.65",
    "python-dotenv>=1.0",
]

[tool.setuptools.packages.find]
where = ["src"]
